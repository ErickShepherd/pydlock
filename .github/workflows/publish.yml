name: Publish to PyPI

# Publishes the package via PyPI Trusted Publishing (OIDC) — no API token is
# stored anywhere (not in the repo, not in GitHub secrets). PyPI verifies the
# workflow's short-lived OIDC identity instead.
#
# Two ways to run:
#   * A published GitHub Release  -> builds and publishes to PyPI.
#   * Manual "Run workflow"       -> choose testpypi (dry run) or pypi.
#
# The publish jobs run in protected GitHub Environments (`pypi` / `testpypi`).
# Add yourself as a required reviewer on each (repo Settings -> Environments)
# so every upload pauses for your one-click approval before it leaves.

on:
  release:
    types: [released]  # full releases only — pre-releases never auto-publish
  workflow_dispatch:
    inputs:
      target:
        description: "Where to publish"
        type: choice
        options: [testpypi, pypi]
        default: testpypi

permissions:
  contents: read

# These jobs hold the PyPI OIDC trust boundary (`id-token: write`), so every
# third-party Action is pinned to a full, verified commit SHA — the only
# immutable Action reference (a moved or compromised upstream tag can otherwise
# change code in the release path without a pydlock commit). The trailing
# `# vX.Y.Z` comment is readability only; Dependabot advances the SHAs via
# reviewed PRs (.github/dependabot.yml). See repo-best-practices §5/§7d.
jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Build
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true  # re-dispatching a dry run for an existing version won't fail

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
