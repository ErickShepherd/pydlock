name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Third-party GitHub Actions are pinned to a full commit SHA (immutable), with a
# trailing version comment for readability; Dependabot advances the SHAs via
# reviewed PRs (.github/dependabot.yml). See repo-best-practices §7d.
jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Install ruff
        run: python -m pip install ruff
      - name: Run ruff
        run: ruff check .

  privacy:
    name: privacy guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Scan the tracked tree for private Gmail addresses
        run: python tools/privacy_scan.py

  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with test extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
      - name: Run tests (offline)
        run: python -m pytest -q

  build:
    name: build + twine check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: python -m pip install build twine
      - name: Build sdist + wheel
        run: python -m build
      - name: Check distributions
        run: twine check dist/*
      - name: Privacy-scan the built artifacts
        run: |
          mkdir -p _artifact_scan/sdist _artifact_scan/wheel
          tar -xzf dist/*.tar.gz -C _artifact_scan/sdist
          python -m zipfile -e dist/*.whl _artifact_scan/wheel
          python tools/privacy_scan.py --paths _artifact_scan
