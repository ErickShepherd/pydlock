name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Third-party GitHub Actions are pinned to a full commit SHA (immutable), with a
# trailing version comment for readability; Dependabot advances the SHAs via
# reviewed PRs (.github/dependabot.yml). See repo-best-practices §7d.
jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install ruff
        run: python -m pip install ruff
      - name: Run ruff
        run: ruff check .

  privacy:
    name: privacy guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Scan the tracked tree for private addresses
        run: python tools/privacy_scan.py

  test:
    name: pytest (py${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Full Python range on Linux, plus the newest Python on Windows and
        # macOS: the package advertises OS independence and Windows binary
        # round-trips, and the most delicate code (os.replace, mode/owner
        # preservation, symlinks, hard links, directory fsync) is
        # platform-dependent. See remediation A4 / repo-best-practices §10a.
        include:
          - { os: ubuntu-latest,  python-version: "3.10" }
          - { os: ubuntu-latest,  python-version: "3.11" }
          - { os: ubuntu-latest,  python-version: "3.12" }
          - { os: ubuntu-latest,  python-version: "3.13" }
          - { os: windows-latest, python-version: "3.13" }
          - { os: macos-latest,   python-version: "3.13" }
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with test extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
      - name: Run tests (offline)
        run: python -m pytest -q

  build:
    name: build + twine check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: python -m pip install build twine
      - name: Build sdist + wheel
        run: python -m build
      - name: Check distributions
        run: twine check dist/*
      - name: Privacy-scan the built artifacts
        run: |
          mkdir -p _artifact_scan/sdist _artifact_scan/wheel
          tar -xzf dist/*.tar.gz -C _artifact_scan/sdist
          python -m zipfile -e dist/*.whl _artifact_scan/wheel
          python tools/privacy_scan.py --paths _artifact_scan

  install-smoke:
    name: clean-install smoke (${{ matrix.artifact }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        artifact: [wheel, sdist]
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - name: Build distributions
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Install the ${{ matrix.artifact }} into a clean venv and smoke-test it
        run: python tools/install_smoke.py --artifact ${{ matrix.artifact }}
